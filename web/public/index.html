<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>حضور و غیاب کارگاه</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 20px 16px; }
    .app { max-width: 420px; margin: 32px auto 0; }

    .brand { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 22px; }
    .brand .logo {
      width: 38px; height: 38px; border-radius: 10px;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 16px rgba(79,70,229,.3);
    }
    .brand .title { font-weight: 700; font-size: 16px; }

    #loginScreen h1 { font-size: 21px; margin: 0 0 4px; text-align: center; }
    #loginScreen .muted { text-align: center; }

    .header-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
    .header-row h1 { font-size: 19px; margin: 0 0 4px; }
    .header-row .workshop-name { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 13px; }
    .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--primary-light); color: var(--primary);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; flex-shrink: 0;
    }
    .ident { display: flex; gap: 12px; align-items: center; }

    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 18px 0 6px; }

    .last-record { border-top: 1px solid var(--border); margin-top: 18px; padding-top: 16px; }
    .last-record h2 { font-size: 14px; margin: 0 0 10px; color: var(--muted); display: flex; align-items: center; gap: 6px; font-weight: 600; }
    .record-box { background: #f9fafb; border-radius: 12px; padding: 4px 14px; }
    .record-row { display: flex; justify-content: space-between; align-items: center; font-size: 13.5px; padding: 9px 0; border-bottom: 1px dashed var(--border); }
    .record-row:last-child { border-bottom: none; }
    .record-row span:first-child { color: var(--muted); }
    .record-row span:last-child { font-weight: 600; }
    .empty-record { color: var(--muted); font-size: 13.5px; text-align: center; padding: 14px 0; }

    .refresh-row { display: flex; justify-content: center; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="app">

    <div class="brand">
      <span class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
      </span>
      <span class="title">حضور و غیاب کارگاه</span>
    </div>

    <!-- صفحه ورود -->
    <section id="loginScreen" class="card fade-in">
      <h1>ورود کارمند</h1>
      <p class="muted">کد پرسنلی و پین خود را وارد کنید.</p>

      <div class="field">
        <label for="employeeCode">کد پرسنلی</label>
        <div class="input-wrap">
          <input id="employeeCode" type="text" placeholder="مثلاً ۱۰۰۱" inputmode="numeric" autocomplete="username" />
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </div>

      <div class="field">
        <label for="employeePin">کد پین</label>
        <div class="input-wrap">
          <input id="employeePin" type="password" placeholder="••••" inputmode="numeric" autocomplete="current-password" />
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
      </div>

      <button id="loginBtn" class="btn primary">ورود</button>
      <p id="loginError" class="error-text"></p>
    </section>

    <!-- صفحه اصلی حضور و غیاب -->
    <section id="mainScreen" class="card hidden">
      <div class="header-row">
        <div class="ident">
          <span class="avatar" id="employeeAvatar">-</span>
          <div>
            <h1 id="employeeName">-</h1>
            <p class="workshop-name">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/></svg>
              <span id="workshopName">-</span>
            </p>
          </div>
        </div>
        <button id="logoutBtn" class="btn ghost small">خروج</button>
      </div>

      <div id="geoStatus" class="status-pill">
        <span class="dot"></span>
        <span id="geoStatusText">در حال دریافت موقعیت...</span>
      </div>

      <div class="actions">
        <button id="checkInBtn" class="btn success">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/></svg>
          ثبت ورود
        </button>
        <button id="checkOutBtn" class="btn danger">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
          ثبت خروج
        </button>
      </div>

      <p id="actionMessage" class="message"></p>

      <div class="last-record">
        <h2>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          آخرین رکورد
        </h2>
        <div id="lastRecordBox" class="record-box">
          <div class="empty-record">رکوردی ثبت نشده است.</div>
        </div>
      </div>

      <div class="refresh-row">
        <button id="refreshHistoryBtn" class="btn ghost small">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          بروزرسانی
        </button>
      </div>
    </section>

  </div>

  <script>
  (function () {
    const BASE_URL = '/api';
    const STORAGE_KEY = 'workshop_attendance_employee';

    let employee = null;
    let currentPosition = null;

    const el = id => document.getElementById(id);

    function apiGet(action, params) {
      const qs = new URLSearchParams(Object.assign({ action }, params || {}));
      return fetch(BASE_URL + '?' + qs.toString()).then(r => r.json());
    }

    function apiPost(action, body) {
      return fetch(BASE_URL + '?action=' + action, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(body)
      }).then(r => r.json());
    }

    // --- ورود ---
    el('loginBtn').addEventListener('click', () => {
      const code = el('employeeCode').value.trim();
      const pin = el('employeePin').value.trim();
      el('loginError').textContent = '';

      if (!code || !pin) {
        el('loginError').textContent = 'کد پرسنلی و پین را وارد کنید.';
        return;
      }

      el('loginBtn').disabled = true;
      el('loginBtn').textContent = 'در حال ورود...';

      apiPost('login', { employee_code: code, pin: pin }).then(res => {
        el('loginBtn').disabled = false;
        el('loginBtn').textContent = 'ورود';
        if (!res.ok) {
          el('loginError').textContent = res.error || 'خطای ورود.';
          return;
        }
        employee = res.data;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(employee));
        showMainScreen();
      }).catch(() => {
        el('loginBtn').disabled = false;
        el('loginBtn').textContent = 'ورود';
        el('loginError').textContent = 'خطا در ارتباط با سرور.';
      });
    });

    el('employeePin').addEventListener('keydown', e => { if (e.key === 'Enter') el('loginBtn').click(); });

    el('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem(STORAGE_KEY);
      employee = null;
      el('mainScreen').classList.add('hidden');
      el('loginScreen').classList.remove('hidden');
    });

    function showMainScreen() {
      el('loginScreen').classList.add('hidden');
      el('mainScreen').classList.remove('hidden');
      el('mainScreen').classList.add('fade-in');
      el('employeeName').textContent = employee.full_name;
      el('employeeAvatar').textContent = (employee.full_name || '-').trim().charAt(0);
      el('workshopName').textContent = employee.workshop ? employee.workshop.name : 'بدون کارگاه تخصیص‌یافته';
      startWatchingLocation();
      loadLastRecord();
    }

    // --- موقعیت جغرافیایی ---
    function startWatchingLocation() {
      if (!navigator.geolocation) {
        setGeoStatus('bad', 'مرورگر شما از موقعیت‌یابی پشتیبانی نمی‌کند.');
        return;
      }
      setGeoStatus('', 'در حال دریافت موقعیت...');
      navigator.geolocation.watchPosition(
        pos => {
          currentPosition = pos;
          const acc = Math.round(pos.coords.accuracy);
          const distanceInfo = employee.workshop ? distanceToWorkshop(pos) : null;

          if (acc > 100) {
            setGeoStatus('bad', 'دقت موقعیت ضعیف است (' + acc + ' متر)');
          } else if (distanceInfo !== null) {
            const within = distanceInfo <= (employee.workshop.radius || 0);
            setGeoStatus(within ? 'ok' : 'bad',
              (within ? 'داخل محدوده کارگاه' : 'خارج از محدوده کارگاه') + ' (' + Math.round(distanceInfo) + ' متر، دقت ' + acc + ' متر)');
          } else {
            setGeoStatus('ok', 'موقعیت دریافت شد (دقت ' + acc + ' متر)');
          }
        },
        err => {
          setGeoStatus('bad', 'خطا در دریافت موقعیت: ' + err.message);
        },
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
      );
    }

    function distanceToWorkshop(pos) {
      const R = 6371000;
      const toRad = d => d * Math.PI / 180;
      const lat1 = pos.coords.latitude, lng1 = pos.coords.longitude;
      const lat2 = Number(employee.workshop.lat), lng2 = Number(employee.workshop.lng);
      const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function setGeoStatus(type, text) {
      const wrap = el('geoStatus');
      const dot = wrap.querySelector('.dot');
      wrap.className = 'status-pill' + (type ? ' ' + type : '');
      dot.className = 'dot' + (type ? ' ' + type : '');
      el('geoStatusText').textContent = text;
    }

    // --- ثبت ورود / خروج ---
    el('checkInBtn').addEventListener('click', () => submitAttendance('check-in'));
    el('checkOutBtn').addEventListener('click', () => submitAttendance('check-out'));

    function submitAttendance(type) {
      if (!currentPosition) {
        showActionMessage('error-text', 'هنوز موقعیت جغرافیایی دریافت نشده است.');
        return;
      }

      setButtonsDisabled(true);
      showActionMessage('', 'در حال ثبت...');

      apiPost(type, {
        employee_id: employee.id,
        lat: currentPosition.coords.latitude,
        lng: currentPosition.coords.longitude,
        accuracy: currentPosition.coords.accuracy,
        device_info: navigator.userAgent
      }).then(res => {
        setButtonsDisabled(false);
        if (!res.ok) {
          showActionMessage('error-text', res.error || 'خطا در ثبت.');
          return;
        }
        showActionMessage('success-text', res.data.message);
        loadLastRecord();
      }).catch(() => {
        setButtonsDisabled(false);
        showActionMessage('error-text', 'خطا در ارتباط با سرور.');
      });
    }

    function setButtonsDisabled(disabled) {
      el('checkInBtn').disabled = disabled;
      el('checkOutBtn').disabled = disabled;
    }

    function showActionMessage(cls, text) {
      const node = el('actionMessage');
      node.className = 'message' + (cls ? ' ' + cls : '');
      node.textContent = text;
    }

    // --- آخرین رکورد ---
    el('refreshHistoryBtn').addEventListener('click', loadLastRecord);

    function loadLastRecord() {
      apiGet('last-status', { employeeId: employee.id }).then(res => {
        const box = el('lastRecordBox');
        if (!res.ok || !res.data || res.data.status === 'no-record') {
          box.innerHTML = '<div class="empty-record">رکوردی ثبت نشده است.</div>';
          return;
        }
        const r = res.data.last_record;
        const typeLabel = r.type === 'check-in' ? 'ورود' : 'خروج';
        const date = new Date(r.timestamp);
        box.innerHTML =
          '<div class="record-row"><span>نوع</span><span>' + typeLabel + '</span></div>' +
          '<div class="record-row"><span>زمان</span><span>' + date.toLocaleString('fa-IR') + '</span></div>' +
          '<div class="record-row"><span>فاصله از کارگاه</span><span>' + (r.distance_m !== '' && r.distance_m !== null ? r.distance_m + ' متر' : '-') + '</span></div>';
      });
    }

    // --- بازیابی نشست قبلی ---
    (function init() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        employee = JSON.parse(saved);
        showMainScreen();
      }
    })();
  })();
  </script>
</body>
</html>
